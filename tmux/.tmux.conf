# ============================================
# MINIMAL TMUX CONFIG + PLUGINS
# ============================================
# Symlinked: ~/.tmux.conf -> this file
# Reload: Ctrl+b r
# Install plugins: Ctrl+b I
# ============================================

# Prefix: Ctrl+b (tmux default)
# Note: conflicts with Claude Code's "background task" keybind — rebind in
# ~/.claude/keybindings.json if needed

# --------------------------------------------
# GENERAL
# --------------------------------------------

set -g history-limit 100000
set -g renumber-windows on
set -sg escape-time 0
set -g mouse on
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ",*:U8=0"
set -g set-titles off

# Silence
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# --------------------------------------------
# SPLITS (vim-style)
# --------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --------------------------------------------
# VIM NAVIGATION
# --------------------------------------------

# Pane select — hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize — repeatable
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window switching — vim buffer style
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Swap panes — like moving lines in vim
bind -r C-j swap-pane -D
bind -r C-k swap-pane -U

# Close pane/window — like :q
bind q confirm-before -p "kill pane? (y/n)" kill-pane
bind Q confirm-before -p "kill window? (y/n)" kill-window

# --------------------------------------------
# COPY MODE (full vim bindings)
# --------------------------------------------

setw -g mode-keys vi
set -g status-keys vi

# Enter copy mode with prefix+Escape (like pressing Escape in vim)
bind Escape copy-mode

# Visual mode bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Yank
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Search (/ and ? like vim)
bind / copy-mode \; send-keys /
bind ? copy-mode \; send-keys ?

unbind -T copy-mode-vi MouseDragEnd1Pane

# --------------------------------------------
# STATUS BAR (catppuccin theme)
# --------------------------------------------

set -g status-interval 5
set -g status-position bottom

# --------------------------------------------
# WINDOW NAMING
# --------------------------------------------

set -g allow-rename on
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# --------------------------------------------
# SHORTCUTS
# --------------------------------------------

bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind S new-session

# --------------------------------------------
# PLUGINS (managed by TPM)
# --------------------------------------------

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# System clipboard — y copies to clipboard, Y copies line
set -g @plugin 'tmux-plugins/tmux-yank'

# Save/restore sessions — Ctrl+b Ctrl+b save, Ctrl+b Ctrl+r restore
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save sessions every 15min, auto-restore on tmux start
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Seamless nvim <-> tmux navigation with Ctrl-h/j/k/l
set -g @plugin 'christoomey/vim-tmux-navigator'

# Fuzzy finder — Ctrl+b F for sessions/windows/panes/commands
set -g @plugin 'sainnhe/tmux-fzf'
set -g @tmux-fzf-launch-key 'F'

# Catppuccin theme — unified look with nvim
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'latte'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
