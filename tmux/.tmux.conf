# ============================================
# MINIMAL TMUX CONFIG + PLUGINS
# ============================================
# Symlinked: ~/.tmux.conf -> this file
# Reload: Ctrl+b r
# Install plugins: Ctrl+b I
# ============================================

# Prefix: Ctrl+b (tmux default)
# Note: conflicts with Claude Code's "background task" keybind — rebind in
# ~/.claude/keybindings.json if needed

# --------------------------------------------
# GENERAL
# --------------------------------------------

set -g history-limit 100000
set -g renumber-windows on
set -sg escape-time 0
set -g mouse on
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ",*:U8=0"
set -g set-titles off

# Silence
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# --------------------------------------------
# SPLITS (vim-style)
# --------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -n "#{b:pane_current_path}" -c "#{pane_current_path}"

# --------------------------------------------
# VIM NAVIGATION
# --------------------------------------------

# Pane select — hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize — repeatable
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window switching — vim buffer style
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Swap panes — like moving lines in vim
bind -r C-j swap-pane -D
bind -r C-k swap-pane -U

# Close pane/window — like :q
bind q confirm-before -p "kill pane? (y/n)" kill-pane
bind Q confirm-before -p "kill window? (y/n)" kill-window

# --------------------------------------------
# COPY MODE (full vim bindings)
# --------------------------------------------

setw -g mode-keys vi
set -g status-keys vi

# Enter copy mode with prefix+Escape (like pressing Escape in vim)
bind Escape copy-mode

# Visual mode bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Yank
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Search (/ and ? like vim)
bind / copy-mode \; send-keys /
bind ? copy-mode \; send-keys ?

unbind -T copy-mode-vi MouseDragEnd1Pane

# --------------------------------------------
# STATUS BAR (catppuccin theme)
# --------------------------------------------

set -g status-interval 5
set -g status-position bottom
set -g allow-rename off
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# --------------------------------------------
# SHORTCUTS
# --------------------------------------------

bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind S run-shell 'tmux new-session -d -s "#{b:pane_current_path}" -c "#{pane_current_path}" && tmux switch-client -t "#{b:pane_current_path}"'

# --------------------------------------------
# VIM-TMUX NAVIGATOR (Ctrl-h/j/k/l across nvim + tmux)
# --------------------------------------------

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'if-shell "[ $(tmux display-message -p \"#{pane_at_right}\") = 0 ]" "select-pane -R" "send-keys C-l"'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# --------------------------------------------
# CLIPBOARD (system clipboard via pbcopy)
# --------------------------------------------

# Clipboard — auto-detect macOS or Linux
if-shell 'command -v pbcopy' {
  set -s copy-command 'pbcopy'
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'
}
if-shell 'command -v xclip' {
  set -s copy-command 'xclip -selection clipboard'
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xclip -selection clipboard'
}
if-shell 'command -v xsel' {
  set -s copy-command 'xsel --clipboard --input'
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xsel --clipboard --input'
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xsel --clipboard --input'
}

# --------------------------------------------
# PLUGINS (managed by TPM)
# --------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# set -g @continuum-restore 'on'  # disabled — don't auto-restore sessions on tmux start
set -g @tmux-fzf-launch-key 'F'

# Status bar — clean and minimal
set -g status-style 'bg=default fg=white'
set -g status-left-length 30
set -g status-left ' #S | '
set -g status-right ' %H:%M '
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #[bold]#I:#W '

# Initialize TPM
run-shell "PATH=/opt/homebrew/bin:$PATH /bin/bash -c 'exec ~/.tmux/plugins/tpm/tpm'"
# Pi harness: enable extended keys in csi-u format so modified Enter keys work
set -g extended-keys on
set -g extended-keys-format csi-u
